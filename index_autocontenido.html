<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOCANEGRA Gastro Bar</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #D4AF37;
            /* Premium Gold */
            --primary-hover: #b5952f;
            --dark-bg: #0a0a0a;
            --text-main: #f9f9f9;
            --text-muted: #cccccc;

            /* Glassmorphism variables */
            --glass-bg: rgba(20, 20, 20, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --glass-blur: blur(12px);

            /* Typography */
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            min-height: 100vh;
            font-family: var(--font-body);
            color: var(--text-main);
            background-color: var(--dark-bg);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Base background setup for the image provided */
        body {
            /* 
               NOTA: Como asistente de IA basado en texto, no puedo extraer los datos (en formato base64) de la imagen 
               que copiaste en mi interfaz gráfica. Aquí he incluido un placeholder base64 (una pixel negro transparente). 
               Para que funcione con tu imagen real, debes convertirla a base64 y pegar el código gigantesco 
               donde dice "PEGA_AQUI_TU_IMAGEN_BASE64". 
               Puedes usar un sitio como base64-image.de para convertirla.
            */
            background-image: url('data:image/jpeg;base64,PEGA_AQUI_TU_IMAGEN_BASE64_CONVIRTIENDOLA_EN_UNA_WEB');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* Overlay to darken background and make text pop */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(10, 10, 10, 0.85) 0%, rgba(10, 10, 10, 0.6) 50%, rgba(10, 10, 10, 0.9) 100%);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: -1;
        }

        /* --- Typography & Animations --- */
        .logo-main {
            font-family: var(--font-heading);
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-main);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8), 0 0 40px rgba(212, 175, 55, 0.3);
            margin-bottom: 0.5rem;
        }

        .logo-sub {
            font-family: var(--font-body);
            font-size: clamp(1rem, 3vw, 1.8rem);
            font-weight: 300;
            letter-spacing: 0.4em;
            color: var(--primary);
            text-transform: uppercase;
        }

        /* --- Header / Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 2rem;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.7;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* --- Menu Section --- */
        .menu-section {
            padding: 4rem 1rem 8rem 1rem;
            display: flex;
            justify-content: center;
        }

        .glass-container {
            width: 100%;
            max-width: 1200px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2rem;
            box-shadow: var(--glass-shadow);
        }

        .section-title {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 2rem;
            color: var(--primary);
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: var(--primary);
            margin: 1rem auto 0;
            border-radius: 2px;
        }

        .menu-filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            font-family: var(--font-body);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--text-main);
        }

        .filter-btn.active {
            background: var(--primary);
            color: var(--dark-bg);
            border-color: var(--primary);
            font-weight: 600;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .menu-item {
            padding: 1.5rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, background 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 0.5rem;
        }

        .item-title {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            color: var(--text-main);
        }

        .item-price {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .item-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-top: 0.5rem;
        }

        /* --- AI Chat System --- */
        .chat-fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #e6c86a);
            color: var(--dark-bg);
            border: none;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.5);
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .chat-fab:hover {
            transform: scale(1.1);
        }

        .pulse {
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.6);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(212, 175, 55, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(212, 175, 55, 0);
            }
        }

        .chat-wrapper {
            position: fixed;
            bottom: 6rem;
            right: 2rem;
            width: 350px;
            height: 500px;
            max-height: calc(100vh - 150px);
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            z-index: 99;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            transform-origin: bottom right;
            opacity: 1;
            transform: scale(1);
        }

        .chat-wrapper.hidden {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        .chat-header {
            padding: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--glass-border);
        }

        .chat-title {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            background: var(--primary);
            color: var(--dark-bg);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
        }

        .chat-title h3 {
            font-size: 1rem;
            font-weight: 500;
        }

        .chat-title .status {
            font-size: 0.75rem;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-title .status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
        }

        .chat-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .chat-close:hover {
            color: var(--text-main);
        }

        .chat-body {
            flex: 1;
            padding: 1.2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Scrollbar styles for chat */
        .chat-body::-webkit-scrollbar {
            width: 6px;
        }

        .chat-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message {
            display: flex;
            max-width: 85%;
        }

        .ai-message {
            align-self: flex-start;
        }

        .user-message {
            align-self: flex-end;
        }

        .bubble {
            padding: 0.8rem 1rem;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .ai-message .bubble {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
            color: var(--text-main);
        }

        .user-message .bubble {
            background: var(--primary);
            color: var(--dark-bg);
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .chat-footer {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid var(--glass-border);
        }

        .input-container {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 0.3rem 0.3rem 0.3rem 1rem;
            transition: border-color 0.3s;
        }

        .input-container:focus-within {
            border-color: var(--primary);
        }

        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
        }

        #chat-input::placeholder {
            color: var(--text-muted);
        }

        #chat-send {
            background: var(--primary);
            color: var(--dark-bg);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }

        #chat-send:active {
            transform: scale(0.9);
        }

        /* Animations Core */
        .bounce {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-10px);
            }

            60% {
                transform: translateY(-5px);
            }
        }

        .fade-in-up {
            animation: fadeInUp 1s ease-out forwards;
        }

        .skew-in {
            animation: skewIn 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .slide-in-bottom {
            animation: slideInBottom 1s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes skewIn {
            from {
                opacity: 0;
                transform: translateY(40px) skewY(5deg);
            }

            to {
                opacity: 1;
                transform: translateY(0) skewY(0);
            }
        }

        @keyframes slideInBottom {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-section {
                padding: 2rem 1rem 6rem;
            }

            .glass-container {
                padding: 2rem 1rem;
            }

            .chat-wrapper {
                width: calc(100% - 2rem);
                right: 1rem;
                bottom: 5.5rem;
            }

            .chat-fab {
                right: 1rem;
                bottom: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-overlay"></div>

    <header class="hero">
        <div class="logo-container">
            <h1 class="logo-main skew-in">BOCANEGRA</h1>
            <p class="logo-sub fade-in-up">GASTRO BAR</p>
        </div>
        <div class="scroll-indicator bounce">
            <p>Descubre nuestra carta</p>
            <i class="fa-solid fa-chevron-down"></i>
        </div>
    </header>

    <main class="menu-section">
        <div class="glass-container slide-in-bottom">
            <h2 class="section-title">Carta de Platos</h2>

            <div class="menu-filters">
                <button class="filter-btn active" data-filter="all">Todos</button>
                <button class="filter-btn" data-filter="entrantes">Entrantes</button>
                <button class="filter-btn" data-filter="principales">Principales</button>
                <button class="filter-btn" data-filter="postres">Postres</button>
            </div>

            <div class="menu-grid" id="menu-grid">
                <!-- Javascript will populate this -->
            </div>
        </div>
    </main>

    <!-- AI Chat System -->
    <button class="chat-fab pulse" id="chat-toggle" aria-label="Abrir Asistente">
        <i class="fa-solid fa-sparkles"></i>
    </button>

    <div class="chat-wrapper hidden" id="chat-wrapper">
        <div class="chat-header">
            <div class="chat-title">
                <div class="chat-avatar"><i class="fa-solid fa-robot"></i></div>
                <div>
                    <h3>Asistente IA</h3>
                    <span class="status">En línea</span>
                </div>
            </div>
            <button class="chat-close" id="chat-close"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="chat-body" id="chat-body">
            <div class="message ai-message">
                <div class="bubble">
                    <p>¡Hola! Soy la inteligencia artificial de Bocanegra Gastro Bar ✨<br><br>¿En qué te puedo ayudar?
                        Puedo recomendarte platos de la carta o sugerirte un buen maridaje.</p>
                </div>
            </div>
        </div>
        <div class="chat-footer">
            <div class="input-container">
                <input type="text" id="chat-input" placeholder="Pregunta sobre la carta..." autocomplete="off">
                <button id="chat-send" aria-label="Enviar"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // Define the Menu Structure
        const menuData = [
            {
                id: 1,
                title: "Jamón Ibérico de Bellota",
                price: "24.00€",
                description: "Cortado a cuchillo al momento, acompañado con pan de cristal y tomate rallado.",
                category: "entrantes"
            },
            {
                id: 2,
                title: "Croquetas Cremosas",
                price: "12.50€",
                description: "Surtido de croquetas caseras: jamón ibérico y boletus con trufa negra.",
                category: "entrantes"
            },
            {
                id: 3,
                title: "Ceviche de Corvina",
                price: "16.00€",
                description: "Marinado en leche de tigre de ají amarillo, maíz chulpi y boniato.",
                category: "entrantes"
            },
            {
                id: 4,
                title: "Lomo de Vaca Madurada",
                price: "28.00€",
                description: "Corte premium a la parrilla, patatas asadas al romero y pimientos del padrón.",
                category: "principales"
            },
            {
                id: 5,
                title: "Tartar de Atún Rojo",
                price: "22.00€",
                description: "Base de aguacate y aliño de soja con emulsión de wasabi ligero.",
                category: "principales"
            },
            {
                id: 6,
                title: "Risotto de Setas Silvestres",
                price: "18.50€",
                description: "Cremoso de parmesano, trufa fresca rallada y crujiente de queso.",
                category: "principales"
            },
            {
                id: 7,
                title: "Tarta de Queso Fluida",
                price: "7.50€",
                description: "Nuestra famosa tarta de queso al horno, estilo viña, con centro cremoso.",
                category: "postres"
            },
            {
                id: 8,
                title: "Coulant de Chocolate Volcánico",
                price: "8.00€",
                description: "Con helado artesanal de vainilla Bourbon de Madagascar.",
                category: "postres"
            }
        ];

        // Reference to DOM elements
        const menuGrid = document.getElementById('menu-grid');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // Render Menu function
        function renderMenu(category = 'all') {
            menuGrid.innerHTML = '';

            const filteredData = category === 'all'
                ? menuData
                : menuData.filter(item => item.category === category);

            filteredData.forEach(item => {
                const menuItem = document.createElement('div');
                menuItem.className = 'menu-item';

                menuItem.innerHTML = `
                    <div class="item-header">
                        <h3 class="item-title">${item.title}</h3>
                        <span class="item-price">${item.price}</span>
                    </div>
                    <p class="item-desc">${item.description}</p>
                `;

                menuGrid.appendChild(menuItem);
            });
        }

        // Menu Filtering Logic
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all
                filterBtns.forEach(b => b.classList.remove('active'));
                // Add active to clicked
                btn.classList.add('active');

                const category = btn.getAttribute('data-filter');
                // Add quick fade effect
                menuGrid.style.opacity = '0';
                setTimeout(() => {
                    renderMenu(category);
                    menuGrid.style.opacity = '1';
                    menuGrid.style.transition = 'opacity 0.4s ease';
                }, 200);
            });
        });

        // Initial Render
        renderMenu();

        // --- AI Chat Logic ---
        const chatToggle = document.getElementById('chat-toggle');
        const chatWrapper = document.getElementById('chat-wrapper');
        const chatClose = document.getElementById('chat-close');
        const chatInput = document.getElementById('chat-input');
        const chatSend = document.getElementById('chat-send');
        const chatBody = document.getElementById('chat-body');

        // Toggle Chat Window
        chatToggle.addEventListener('click', () => {
            chatWrapper.classList.toggle('hidden');
            // Remove pulse when interacted
            chatToggle.classList.remove('pulse');
            if (!chatWrapper.classList.contains('hidden')) {
                chatInput.focus();
            }
        });

        chatClose.addEventListener('click', () => {
            chatWrapper.classList.add('hidden');
        });

        // Responses logic simulation
        const responses = [
            { keys: ['hola', 'buenas', 'saludos'], text: "¡Hola! Bienvenido a Bocanegra Gastro Bar. ¿Te gustaría ver nuestra carta o reservar mesa?" },
            { keys: ['recomiend', 'sugerenc', 'mejor'], text: "Te sugiero que pruebes nuestro 'Lomo de Vaca Madurada' o si prefieres algo de mar, nuestro 'Ceviche de Corvina' está espectacular. ¿Eres más de carne o de pescado?" },
            { keys: ['carne', 'vaca', 'lomo'], text: "¡Buena elección! Nuestro Lomo de Vaca Madurada se deshace en la boca. Acompañado con una copa de nuestro vino tinto de la casa, es la combinación perfecta." },
            { keys: ['pescado', 'atun', 'ceviche'], text: "Excelente. El Tartar de Atún Rojo es uno de nuestros best-sellers, preparado con ingredientes frescos cada día." },
            { keys: ['postre', 'dulce'], text: "No puedes irte sin probar nuestra Tarta de Queso Fluida, ¡es famosa en la ciudad!" },
            { keys: ['precio', 'cuesta'], text: "Nuestros entrantes rondan los 15-20€ y los principales entre 18-30€. ¿Buscas algo en particular?" },
            { keys: ['jamon', 'iberico'], text: "Nuestro Jamón Ibérico de Bellota es cortado a cuchillo al momento, tiene un precio de 24.00€. ¡Irresistible!" }
        ];

        function addMessage(text, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;

            msgDiv.innerHTML = `
                <div class="bubble">
                    <p>${text}</p>
                </div>
            `;

            chatBody.appendChild(msgDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function handleChat() {
            const text = chatInput.value.trim();
            if (text === '') return;

            // Add user message
            addMessage(text, true);
            chatInput.value = '';

            // Thinking delay...
            setTimeout(() => {
                // Simple mock NLP matching
                let reply = "Lo siento, no he entendido completamente. Pero te invito a echar un vistazo a nuestra carta de platos, estoy seguro de que encontrarás algo delicioso.";
                const lowerText = text.toLowerCase();

                for (let r of responses) {
                    if (r.keys.some(k => lowerText.includes(k))) {
                        reply = r.text;
                        break;
                    }
                }

                addMessage(reply, false);
            }, 800 + Math.random() * 500); // Between 0.8s and 1.3s delay for realism
        }

        chatSend.addEventListener('click', handleChat);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleChat();
            }
        });
    </script>
</body>

</html>
